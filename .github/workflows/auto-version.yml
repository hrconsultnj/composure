name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-version]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PREVIEW_DISPATCH_TOKEN }}

      - name: Bump versions
        run: |
          MARKETPLACE=".claude-plugin/marketplace.json"
          BUMPED=""

          # 1. Bump marketplace metadata version (suite-level)
          CURRENT=$(jq -r '.metadata.version' "$MARKETPLACE")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          SUITE_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          jq --arg v "$SUITE_VERSION" '.metadata.version = $v' "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"

          # 2. Bump each plugin's own patch version (independent versioning)
          PLUGIN_COUNT=$(jq '.plugins | length' "$MARKETPLACE")
          for i in $(seq 0 $((PLUGIN_COUNT - 1))); do
            PLUGIN_NAME=$(jq -r --argjson i "$i" '.plugins[$i].name' "$MARKETPLACE")
            PLUGIN_VER=$(jq -r --argjson i "$i" '.plugins[$i].version' "$MARKETPLACE")

            # Bump this plugin's patch
            IFS='.' read -r P_MAJOR P_MINOR P_PATCH <<< "$PLUGIN_VER"
            P_NEW="$P_MAJOR.$P_MINOR.$((P_PATCH + 1))"

            # Update in marketplace.json
            jq --argjson i "$i" --arg v "$P_NEW" \
              '.plugins[$i].version = $v' "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"

            # Update in plugin's own plugin.json
            PLUGIN_JSON="plugins/${PLUGIN_NAME}/.claude-plugin/plugin.json"
            if [ -f "$PLUGIN_JSON" ]; then
              jq --arg v "$P_NEW" '.version = $v' "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"
            fi

            BUMPED="${BUMPED} ${PLUGIN_NAME}:${PLUGIN_VER}→${P_NEW}"
          done

          echo "Suite: $CURRENT → $SUITE_VERSION |$BUMPED"
          echo "SUITE_VERSION=$SUITE_VERSION" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json plugins/*/.claude-plugin/plugin.json
          git diff --cached --quiet && echo "No version change needed" && exit 0
          git commit -m "chore: auto-bump suite to v${SUITE_VERSION} [skip-version]"
          git push
