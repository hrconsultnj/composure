name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this action (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip-version]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump composure patch version
        run: |
          PLUGIN_JSON="plugins/composure/.claude-plugin/plugin.json"
          CURRENT=$(jq -r '.version' "$PLUGIN_JSON")

          # Split version and bump patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          # Update plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"

          echo "Bumped $CURRENT → $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/composure/.claude-plugin/plugin.json
          git diff --cached --quiet && echo "No version change needed" && exit 0
          git commit -m "chore: auto-bump to v${NEW_VERSION} [skip-version]"
          git push
